on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

name: Checkout and Create Release Version

# ==================== 在这里统一管理固定的各组件版本 ====================
env:
  TARGET_1PANEL_VERSION: "v1.10.29-lts"   # 你指定的 1Panel 源码版本
  TARGET_DOCKER_VERSION: "v29.4.1"        # Docker 静态包版本
  TARGET_COMPOSE_VERSION: "v5.1.4"        # Docker Compose 插件版本
# ====================================================================

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # 1Panel 要求的标准编译 Go 环境

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 🔥 根据 Vite 6 和 @types/node 精准对齐到稳定的 Node 20 LTS

      - name: Check Version
        id: get-version
        run: |
          version="${{ env.TARGET_1PANEL_VERSION }}"
          docker_version="${{ env.TARGET_DOCKER_VERSION }}"
          compose_version="${{ env.TARGET_COMPOSE_VERSION }}"
          
          echo "version=${version}" >> $GITHUB_OUTPUT
          echo "app_version=${version}" >> $GITHUB_OUTPUT
          echo "docker_version=${docker_version/v/}" >> $GITHUB_OUTPUT
          echo "compose_version=${compose_version}" >> $GITHUB_OUTPUT

      # 🔥 前端生产构建与后端现场交叉编译
      - name: Download and Compile Official 1Panel Zip Source
        run: |
          echo "=== 正在下载 1Panel 官方源码 Zip 包 ==="
          wget -q "https://github.com/1Panel-dev/1Panel/archive/refs/tags/${{ steps.get-version.outputs.version }}.zip" -O source.zip
          
          echo "=== 正在解压源码 ==="
          unzip -q source.zip
          
          # 🔍 动态捕捉包含 go.mod 的项目根目录路径
          ROOT_DIR=$(find . -maxdepth 2 -name "go.mod" -exec dirname {} \;)
          echo "定位到项目 Go 根目录为: ${ROOT_DIR}"
          
          # ==================== ✨ 前端打包核心步骤 ====================
          echo "=== 📦 开始编译前端静态资源 ==="
          cd "${ROOT_DIR}/frontend"
          
          # 1. 使用国内镜像源安装前端依赖
          npm install --registry=https://registry.npmmirror.com
          
          # 2. 精准执行 package.json 里的生产环境专属打包命令
          npm run build:pro
          
          # 3. 返回 Actions 工作流主路径
          cd -
          # =============================================================
          
          echo "=== 正在下载 Go 依赖包 ==="
          go mod -C "${ROOT_DIR}" download
          
          # 🔍 动态查找 cmd/ 目录下的核心 main.go 入口文件路径
          MAIN_GO_PATH=$(find "${ROOT_DIR}/cmd" -name "main.go" | head -n 1 | sed "s|${ROOT_DIR}/||")
          echo "抓取到主程序编译入口为: ${MAIN_GO_PATH}"
          
          # 创建统一的编译产物输出目录
          mkdir -p compiled_bins/amd64 compiled_bins/arm64
          
          echo "=== 开始现场交叉编译 AMD64 (x86_64) 二进制 ==="
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -C "${ROOT_DIR}" -ldflags "-s -w" -o ../../compiled_bins/amd64/1panel "${MAIN_GO_PATH}"
          
          echo "=== 开始现场交叉编译 ARM64 (aarch64) 二进制 ==="
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -C "${ROOT_DIR}" -ldflags "-s -w" -o ../../compiled_bins/arm64/1panel "${MAIN_GO_PATH}"
          
          echo "=== 核心二进制编译完成 ==="
          ls -lh compiled_bins/*

      - name: Check Release
        id: check-release
        run: |
          gh release view ${{ steps.get-version.outputs.version }} -R ${{ github.repository }} >/dev/null 2>&1 || echo "create=1" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Build
        id: check-build
        run: |
          gh release view ${{ steps.get-version.outputs.version }} -R ${{ github.repository }} | grep 1panel-.*-offline-linux-amd64.tar.gz >/dev/null 2>&1 || echo "build=1" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Tag
        run: |
          sed -i "s@VERSION=v.*@VERSION=${{ steps.get-version.outputs.version }}@" install.sh
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Release ${{ steps.get-version.outputs.version }}"
          git tag -a "${{ steps.get-version.outputs.version }}" -m "Release ${{ steps.get-version.outputs.version }}" || true
          git push origin "${{ steps.get-version.outputs.version }}" || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        if: steps.check-release.outputs.create == 1
        run: |
          gh release create ${{ steps.get-version.outputs.version }} --notes "Release ${{ steps.get-version.outputs.version }}" -R ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Make Offline
        if: steps.check-build.outputs.build == 1
        run: |
          chmod +x prepare.sh
          sudo ./prepare.sh --app_version ${{ steps.get-version.outputs.app_version }} --docker_version ${{ steps.get-version.outputs.docker_version }} --compose_version ${{ steps.get-version.outputs.compose_version }}

      - name: Upgrade Release
        if: steps.check-build.outputs.build == 1
        run: |
          gh release upload ${{ steps.get-version.outputs.version }} build/${{ steps.get-version.outputs.version }}/*.tar.gz -R ${{ github.repository }} --clobber
          gh release upload ${{ steps.get-version.outputs.version }} build/${{ steps.get-version.outputs.version }}/checksums.txt -R ${{ github.repository }} --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
